<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotoo Overview</title>
    <link rel="icon" type="image/x-icon" href="../shared/assets/icons/favicon.ico">
    <link rel="stylesheet" href="admin-panel.css">
</head>
<body>
    <div class="overview-container">
        
        <div class="overview-title">Robotoo Admin Panel</div>

        <div class="main-grid">
            <button class="grid-btn" onclick="location.href='../cms'">
                <img src="assets/icons/questions.svg" alt="figuur vragen" class="btn-icon">
                <span>Vragen</span>
            </button>
            <button class="grid-btn" onclick="location.href='../settings'">
                <img src="assets/icons/settings.svg" alt="figuur instellingen" class="btn-icon">
                <span>Instellingen</span>
            </button>
            <button class="grid-btn" onclick="location.href='../grafieken'">
                <img src="assets/icons/bar-chart.svg" alt="figuur bar-chart" class="btn-icon">
                <span>Statistieken</span>
            </button>
            <button class="grid-btn" onclick="location.href='../manual-driving'">
                <img src="assets/icons/controller.svg" alt="figuur manueel rijden" class="btn-icon">
                <span>Manueel Rijden</span>
            </button>
        </div>

        <div class="hardware-controls">
            <div class="control-group">
                <span class="control-label">Projector</span>
                <div class="control-buttons">
                    <button class="action-btn on" onclick="toggleProjector('1')">On</button>
                    <button class="action-btn off" onclick="toggleProjector('0')">Off</button>
                </div>
            </div>
            
            <div class="control-group">
                <span class="control-label">Lens</span>
                <div class="control-buttons">
                    <button class="action-btn on" onclick="toggleProjector('wake')">Wake</button>
                    <button class="action-btn off" onclick="toggleProjector('sleep')">Sleep</button>
                </div>
            </div>
        </div>

       <button id="backToQuizBtn" class="back-to-quiz-btn" style="display: block;" onclick="backToQuiz()">
            Terug naar quiz
        </button>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="../shared/scripts/admin-session.js"></script>
    <script src="./admin-panel.js"> </script>
</body>
</html>
