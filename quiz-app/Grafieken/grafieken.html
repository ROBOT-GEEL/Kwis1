<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Statistieken</title>

    <link rel="icon" type="image/x-icon" href="../shared/assets/icons/favicon.ico">

    <link rel="stylesheet" href="grafieken.css">
    
    <script src="assets/scripts/chart.js"></script>
    <script src="assets/scripts/chartjs-plugin-labels.js"></script>
    <script src="assets/scripts/chartjs-adapter-date-fns.js"></script>
    <script src="assets/scripts/apexcharts.js"></script>
</head>

<body>
    
    <div class="page-wrapper">
        
        <header class="page-header">
            <div id="infoDiv">
                <h1 class="page-title">Statistieken</h1>
                <p class="page-description">Op deze pagina kunt u de antwoorden van de bezoekers bekijken.</p>
                <p class="filter-description" id="filterText"></p>
            </div>
            
            <div class="header-button-row">
                <button class="btn-back" onclick="location.href='index.html'">
                    <span class="btn-text">Terug naar keuzemenu</span>
                </button>
                <button class="btn-secondary" onclick="location.href='../admin-panel'">
                    <span class="btn-text">Terug naar admin panel</span>
                </button>
            </div>
        </header>

        <main class="content-body">
            <div id="divGrafieken" class="charts-grid"></div>
        </main>
    </div>

    <div id="grapgoverlay" class="overlay"></div>
    <div id="graphmodal" class="modal">
        <button class="btn-close-modal" id="closeModalBtn">&times;</button>
        <div id="modalContent"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="../shared/scripts/admin-session.js"></script>
    <script src="grafieken.js"></script>
</body>

</html>
