<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotoo Dashboard - Keuzemenu</title>
    <link rel="icon" type="image/x-icon" href="../shared/assets/icons/favicon.ico">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="page-wrapper">
        
        <header class="page-header">
            <div>
                <h1 class="page-title">Keuzemenu</h1>
                <p class="page-description">Kies uw zoekparameters voor gegeven antwoorden op de vragen weer te geven. 
                    Duid in elke kolom minstens één optie aan. 'Bezocht' en 'Niet bezocht' geven aan of de bezoeker de expo heeft bezocht.</p>
            </div>
        </header>

        <main class="content-body">
            
            <section class="selection-card">
                <p class="warning-text" id="ongeldigeOptie">Kies minstens 1 optie in elke kolom!</p>
                
                <div class="checkbox-container">
                    
                    <div class="checkbox-column">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="actief">
                            <span class="checkmark"></span>
                            Actief
                        </label>
                        <label class="custom-checkbox">
                            <input type="checkbox" id="gearchiveerd">
                            <span class="checkmark"></span>
                            Gearchiveerd
                        </label>
                    </div>

                    <div class="divider"></div>

                    <div class="checkbox-column">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="bezocht">
                            <span class="checkmark"></span>
                            Bezocht
                        </label>
                        <label class="custom-checkbox">
                            <input type="checkbox" id="nietbezocht">
                            <span class="checkmark"></span>
                            Niet bezocht
                        </label>
                    </div>

                </div>

                <div class="card-actions">
                    <button id="searchButton" class="btn-primary action-btn" onclick="setLocation()">
                        <span class="btn-text">Zoek!</span>
                    </button>
                    
                    <button class="btn-secondary action-btn" onclick="location.href='../admin-panel'">
                        <span class="btn-text">Terug naar admin panel</span>
                    </button>
                </div>
            </section>

        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="../shared/scripts/admin-session.js"></script>
    <script src="index.js"></script>
</body>
</html>
