<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Vragen</title>
    <link rel="icon" image="image/x-icon" href="../shared/assets/icons/favicon.ico">
    <link rel="stylesheet" href="cms.css">
</head>
<body>

    <div class="page-container">
        
        <nav class="left-nav">
            <button id="questionsButtonFrame" class="nav-button active" onclick="displayQuestions()">Vragen</button>
            <button id="visitedFrame" class="nav-button" onclick="buttonVisited()">Bezocht</button>
            <button id="enabledFrame" class="nav-button" onclick="buttonEnable()">Actief</button>
            <button class="nav-button back-admin" onclick="window.location.href='../admin-panel'">Terug naar admin panel</button>
        </nav>

        <main class="main-content">
            
            <div class="header-section">
                <h1 id="title" class="vragen">Vragen</h1>
                <p id="pageExplanation" class="explanation-text"></p>
                
                <div class="action-buttons" id="actionButtonsContainer">
                    <button id="btnSave" class="btn-primary" style="display: none;">Opslaan</button>
                    <button id="btnCancel" class="btn-secondary" style="display: none;">Annuleren</button>
                    <button id="buttonAddQuestion" class="btn-primary" onclick="buttonAddQuestion(document.getElementById('questionsFrame'))">Vraag Toevoegen</button>
                </div>
            </div>

            <div class="questionsBody">
                <div id="questionsFrame" class="questionsFrame"></div>
            </div>
            
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="../shared/scripts/admin-session.js"></script>
    <script src="js/common.js"></script>
    <script src="js/questions.js"></script>
    <script src="js/enable.js"></script>
    <script src="js/visited.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
