<!DOCTYPE html>
<html>
    <head>
        <title>Projector View</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">

        <script src="socket.io/socket.io.js"></script>
        <script defer src="./app.js"></script>
        <script src="assets/scripts/textFit.min.js"></script>

        <link rel="stylesheet" href="./projector.css">
    </head>
    <body>
        <!-- Main quiz screen: shows the current question and answers -->
        <main class="hidden" id="projector-quiz">
            <div id="question">Vraag</div>
            <div id="answers">
                <div class="answer" id="answer-0">
                    <div class="answer-label">A</div>
                    <div class="answer-text">Antwoord A test test test test test testttt test test</div>
                </div>
                <div class="answer" id="answer-1">
                    <div class="answer-label">B</div>
                    <div class="answer-text">Antwoord B</div>
                </div>
                <div class="answer" id="answer-2">
                    <div class="answer-label">C</div>
                    <div class="answer-text">Antwoord C</div>
                </div>
            </div>
            <div id="timer">
                <span>10s</span>
                <progress value="100" max="100"></progress>
            </div>
        </main>
    </body>
</html>
