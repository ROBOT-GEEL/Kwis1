<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Quiz Interface</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">

        <link href="https://fonts.cdnfonts.com/css/co-headline" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wdth,wght@0,75..100,300..800;1,75..100,300..800&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="./navigatiescherm.css">

        <script src="socket.io/socket.io.js"></script>
    </head>

    <body>
        <div class="page">
            <header class="topbar">
            </header>

            <main class="main">
                <div class="arrows-grid">
                    <button class="arrow up" ontouchstart="driveBackward()" ontouchend="driveStop()" onmouseup="driveStop()" onmousedown="driveBackward()">
                        <img src="arrow_up_0.png" alt="Up">
                    </button>

                    <button class="arrow left" ontouchstart="driveLeft()" ontouchend="driveStop()" onmouseup="driveStop()" onmousedown="driveLeft()">
                        <img src="arrow_left_0.png" alt="Left">
                    </button>

                    <button class="arrow right" ontouchstart="driveRight()" ontouchend="driveStop()" onmouseup="driveStop()" onmousedown="driveRight()">
                        <img src="arrow_right.png" alt="Right">
                    </button>

                    <button class="arrow down" ontouchstart="driveForward()" ontouchend="driveStop()" onmouseup="driveStop()" onmousedown="driveForward()">
                        <img src="arrow_down_0.png" alt="Down">
                    </button>
                </div>
            </main>
        </div>

        <footer class="bottombar" role="navigation">
            <button class="btn" onclick="quiz()">Go to quiz</button>
            <button class="btn" onclick="goHome()">Go home</button>
            <button class="btn" onclick="goCMS()">Go CMS</button>
        </footer>

        <script defer src="./nav.js"></script>
    </body>
</html>
