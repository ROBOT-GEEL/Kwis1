<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Zones</title>
    <link rel="icon" type="image/x-icon" href="../shared/assets/icons/favicon.ico">
    <link rel="stylesheet" href="zones.css">
</head>

<body>
    
    <div class="page-wrapper">
        
        <header class="page-header">
            <h1 class="page-title" id="title">Antwoordzones herconfigureren</h1>
            <p class="page-description">Duid de drie zones aan op het camerabeeld (4 punten per zone).</p>
            
            <div class="header-button-row">
                <div class="header-actions">
                    <button class="btn-primary" onclick="saveZones()">
                        <span class="btn-text">Opslaan</span>
                    </button>
                    <button class="btn-secondary" onclick="location.href='./'">
                        <span class="btn-text">Annuleren</span>
                    </button>
                </div>
                
                <button class="btn-back" onclick="location.href='./'">
                    <span class="btn-text">Terug naar instellingen</span>
                </button>
            </div>
        </header>

        <main class="content-body">
            
            <div class="zone-controls">
                <div class="zone-selectors">
                    <button class="zone-btn active" onclick="selectZone(1)" id="btn-zone-1">
                        <span class="btn-text">Zone A (Rood)</span>
                    </button>
                    <button class="zone-btn" onclick="selectZone(2)" id="btn-zone-2">
                        <span class="btn-text">Zone B (Blauw)</span>
                    </button>
                    <button class="zone-btn" onclick="selectZone(3)" id="btn-zone-3">
                        <span class="btn-text">Zone C (Groen)</span>
                    </button>
                </div>

                <div class="action-group">
                    <button class="btn-secondary" onclick="clearCurrentZone()">
                        <span class="btn-text">Wis Zone</span>
                    </button>
                    <button class="btn-secondary" onclick="location.reload(true)">
                        <span class="btn-text">Nieuwe foto</span>
                    </button>
                </div>
            </div>

            <div id="zone-wrapper" class="zone-wrapper">
                <img id="cameraImage" src="" alt="Camerabeeld" onload="resizeCanvas()" />
                <canvas id="drawingCanvas"></canvas>
            </div>

        </main>
    </div>

    <script src="zones.js"></script>
</body>

</html>
